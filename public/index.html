<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Clone Talking</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      background: #000;
      color: #fff;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ===================== CALL SCREEN ===================== */
    #call-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100dvh;
      padding: 3.5rem 2rem 3rem;
      background: linear-gradient(180deg, #111827 0%, #030712 100%);
    }

    .call-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    #call-timer {
      font-size: 1rem;
      color: #9ca3af;
      letter-spacing: 0.1em;
      font-variant-numeric: tabular-nums;
      min-height: 1.5em;
    }

    /* Avatar + pulse rings */
    .avatar-wrap {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 1.2rem 0 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pulse-ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 1.5px solid rgba(99, 179, 237, 0.35);
      transform: translate(-50%, -50%) scale(1);
      opacity: 0;
    }
    .pulse-ring.r1 { animation: pulse 2.4s ease-out infinite 0s; }
    .pulse-ring.r2 { animation: pulse 2.4s ease-out infinite 0.8s; }
    .pulse-ring.r3 { animation: pulse 2.4s ease-out infinite 1.6s; }

    @keyframes pulse {
      0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
    }

    /* Pause rings when not listening */
    body:not(.is-listening) .pulse-ring {
      animation-play-state: paused;
      opacity: 0;
    }

    #avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2d3a6b 0%, #111827 100%);
      border: 2px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
      transition: box-shadow 0.4s ease;
    }
    body.is-playing #avatar {
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.5), 0 0 40px rgba(96, 165, 250, 0.2);
    }

    #clone-name {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #f9fafb;
    }

    #deepfake-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #6366f1;
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.3);
      padding: 0.15rem 0.55rem;
      border-radius: 99px;
    }

    #call-status {
      font-size: 0.9rem;
      color: #6b7280;
      min-height: 1.4em;
      letter-spacing: 0.02em;
    }

    /* Volume bars */
    #vol-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 28px;
      margin-top: 0.4rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #vol-bars.visible { opacity: 1; }

    .vb {
      width: 4px;
      background: #4ade80;
      border-radius: 2px;
      height: 3px;
      transition: height 0.07s ease;
    }

    /* ===================== BOTTOM CONTROLS ===================== */
    .call-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    #mic-label {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4b5563;
      transition: color 0.2s;
    }
    #mic-label.on { color: #4ade80; }

    #end-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #dc2626;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(220, 38, 38, 0.45);
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    #end-btn:active { background: #b91c1c; transform: scale(0.94); }

    #end-btn svg {
      width: 30px; height: 30px;
      fill: #fff;
      transform: rotate(135deg);
    }

    /* ===================== TRANSCRIPT SCREEN ===================== */
    #transcript-screen {
      display: none;
      flex-direction: column;
      height: 100dvh;
      background: #0a0a0a;
    }

    .t-header {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 1.25rem 1rem 1rem;
      border-bottom: 1px solid #1f1f1f;
      flex-shrink: 0;
    }

    .t-avatar-sm {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2d3a6b 0%, #111827 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    .t-header-text { flex: 1; }
    .t-header-text h2 { font-size: 1rem; font-weight: 600; color: #f3f4f6; }
    .t-header-text span { font-size: 0.78rem; color: #6b7280; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .msg {
      max-width: 82%;
      padding: 0.6rem 0.95rem;
      font-size: 0.92rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.user {
      background: #1d4ed8;
      color: #eff6ff;
      align-self: flex-end;
      border-radius: 18px 18px 4px 18px;
    }
    .msg.assistant {
      background: #1c1c1c;
      color: #e5e7eb;
      align-self: flex-start;
      border-radius: 18px 18px 18px 4px;
    }
    .msg.error-msg {
      background: #450a0a;
      color: #fca5a5;
      align-self: center;
      border-radius: 10px;
      font-size: 0.82rem;
      max-width: 92%;
      text-align: center;
    }

    .t-footer {
      padding: 1rem;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
      text-align: center;
    }

    #new-call-btn {
      background: #1d4ed8;
      color: #fff;
      border: none;
      padding: 0.75rem 2.5rem;
      border-radius: 99px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #new-call-btn:active { opacity: 0.8; }
  </style>
</head>
<body>

  <!-- CALL SCREEN -->
  <div id="call-screen">
    <div class="call-top">
      <div id="call-timer">&nbsp;</div>
      <div class="avatar-wrap">
        <div class="pulse-ring r1"></div>
        <div class="pulse-ring r2"></div>
        <div class="pulse-ring r3"></div>
        <div id="avatar">…</div>
      </div>
      <div id="clone-name">Connecting…</div>
      <div id="deepfake-label">Deepfake</div>
      <div id="call-status">Connecting…</div>
      <div id="vol-bars">
        <div class="vb" id="vb1"></div>
        <div class="vb" id="vb2"></div>
        <div class="vb" id="vb3"></div>
        <div class="vb" id="vb4"></div>
        <div class="vb" id="vb5"></div>
        <div class="vb" id="vb6"></div>
        <div class="vb" id="vb7"></div>
      </div>
    </div>

    <div class="call-bottom">
      <div id="mic-label">mic off</div>
      <button id="end-btn" title="End call">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.27-.27.67-.36
            1.02-.24 1.12.37 2.33.57 3.58.57.55 0 1 .45 1 1V20c0 .55-.45
            1-1 1C10.18 21 3 13.82 3 5c0-.55.45-1 1-1h3.5c.55 0 1 .45 1
            1 0 1.25.2 2.45.57 3.58.11.35.03.74-.27 1.02l-2.2 2.2z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- TRANSCRIPT SCREEN -->
  <div id="transcript-screen">
    <div class="t-header">
      <div class="t-avatar-sm" id="t-avatar">…</div>
      <div class="t-header-text">
        <h2 id="t-name">Clone</h2>
        <span id="t-duration"></span>
      </div>
    </div>
    <div id="messages"></div>
    <div class="t-footer">
      <button id="new-call-btn">New Call</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
